name: 📅 Weekly Digest

on:
  workflow_dispatch:

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - id: python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        id: cache-venv
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-py${{ steps.python.outputs.python-version }}-req-${{ hashFiles('requirements.txt') }}
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
      - run: pip install -r requirements.txt --quiet --disable-pip-version-check
        if: steps.cache-venv.outputs.cache-hit != 'true'
      - name: 📅 Run Weekly Digest
        timeout-minutes: 8
        working-directory: ${{ github.workspace }}
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY:    ${{ secrets.GOOGLE_AI_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY:      ${{ secrets.FINNHUB_KEY }}
          HF_KEY:           ${{ secrets.HF_KEY }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
        run: python jobs/weekly_digest.py
