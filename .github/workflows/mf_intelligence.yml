name: 💹 MF Intelligence

on:
  workflow_dispatch:

concurrency:
  group: mf-intelligence
  cancel-in-progress: false

jobs:
  mf-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        id: python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 💾 Cache site-packages
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-py${{ steps.python.outputs.python-version }}-req-${{ hashFiles('requirements.txt') }}

      - name: 📦 Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt --quiet --disable-pip-version-check

      - name: 💹 Run MF Intelligence
        timeout-minutes: 4
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python jobs/mf_intelligence.py