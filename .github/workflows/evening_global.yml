name: 🌃 Evening Global Report

on:
  schedule:
    - cron: '15 13 * * 1-5'
  workflow_dispatch:

jobs:
  evening-global:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
      - run: pip install -r requirements.txt --quiet
      - name: 🌃 Run Evening Report
        env:
          PYTHONPATH:       ${{ github.workspace }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY:    ${{ secrets.GOOGLE_AI_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY:      ${{ secrets.FINNHUB_KEY }}
          HF_KEY:           ${{ secrets.HF_KEY }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
        run: PYTHONPATH=$GITHUB_WORKSPACE python jobs/evening_report.py