name: 🔔 Market Close Summary

on:
  workflow_dispatch:

concurrency:
  group: bot-state-write
  cancel-in-progress: false

jobs:
  market-close:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - id: python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        id: cache-venv
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-py${{ steps.python.outputs.python-version }}-req-${{ hashFiles('requirements.txt') }}
      - name: 💾 Cache skip state
        uses: actions/cache@v4
        with:
          path: data/skip_state.json
          key: skip-state-${{ github.workflow }}-${{ github.run_id }}
          restore-keys: skip-state-${{ github.workflow }}-
      - run: pip install -r requirements.txt --quiet --disable-pip-version-check
        if: steps.cache-venv.outputs.cache-hit != 'true'
      - name: 🔔 Run Market Close
        timeout-minutes: 8
        working-directory: ${{ github.workspace }}
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY:    ${{ secrets.GOOGLE_AI_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY:      ${{ secrets.FINNHUB_KEY }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
        run: python jobs/market_close.py
