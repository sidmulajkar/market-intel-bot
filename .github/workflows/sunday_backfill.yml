name: 📥 Sunday CSV Backfill

on:
  schedule:
    - cron: '0 2 * * 0'  # 02:00 UTC Sunday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sunday-backfill
  cancel-in-progress: false

jobs:
  csv-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - id: python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        id: cache-venv
        with:
          path: ${{ env.pythonLocation }}
          key: ${{ runner.os }}-py${{ steps.python.outputs.python-version }}-req-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt --quiet --disable-pip-version-check
        if: steps.cache-venv.outputs.cache-hit != 'true'
      - name: 📥 Run Sunday consolidation (Supabase → CSV → git push)
        timeout-minutes: 8
        working-directory: ${{ github.workspace }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m src.sunday_backfill
      - name: ° Cleanup — remove stale CSV temp files
        if: always()
        run: rm -f /tmp/nse_options_chain_cache.json 2>/dev/null; echo "Cleanup done"
